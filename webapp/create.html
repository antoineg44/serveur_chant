<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebApp - Nouveau programme</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="./config.js"></script>
  <style>
    .create-form {
      max-width: 540px;
      margin-top: 24px;
    }

    .nice-form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }

    .nice-form-group label {
      font-weight: 600;
      font-size: 0.92rem;
      color: var(--ink);
    }

    .nice-form-group input,
    .nice-form-group select,
    .nice-form-group textarea {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 12px;
      font: inherit;
      font-size: 0.95rem;
      background: #fff;
      color: var(--ink);
      width: 100%;
    }

    .nice-form-group textarea {
      resize: vertical;
      min-height: 90px;
    }

    .form-message {
      font-size: 0.9rem;
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 16px;
      display: none;
    }

    .form-message.is-error {
      display: block;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
    }

    .form-message.is-success {
      display: block;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
    }

    .form-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
  </style>
  <script>
    (async () => {
      try {
        const AUTH_API = (window.WEBAPP_CONFIG && window.WEBAPP_CONFIG.AUTH_API)
          || `${(window.WEBAPP_CONFIG && window.WEBAPP_CONFIG.BASE_URL) || ''}webapp/api/auth.php`;
        const res = await fetch(`${AUTH_API}?action=check`, { credentials: 'include' });
        const data = await res.json();
        if (!data.success) {
          window.location.replace('./login.html');
        }
      } catch {
        window.location.replace('./login.html');
      }
    })();
  </script>
</head>
<body>

  <form id="create-program-form" class="create-form" novalidate>
    <div id="form_message" class="form-message" role="alert"></div>

    <div class="nice-form-group">
      <label for="paroisse">Paroisse</label>
      <select id="paroisse" name="paroisse" required>
        <option value="">Sélectionnez une paroisse</option>
      </select>
    </div>

    <div class="nice-form-group">
      <label for="template">Template</label>
      <select id="template" name="template" required>
        <option value="">Sélectionnez un template</option>
      </select>
    </div>

    <div class="nice-form-group">
      <label for="occasion">Occasion</label>
      <input type="text" id="occasion" name="occasion" required placeholder="Ex : Messe ordinaire, Noël…" />
    </div>

    <div class="nice-form-group">
      <label for="lieu">Lieu</label>
      <input type="text" id="lieu" name="lieu" required placeholder="Ville ou lieu" />
    </div>

    <div class="nice-form-group">
      <label for="date">Date</label>
      <input type="date" id="date" name="date" required />
    </div>

    <div class="nice-form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description" rows="4" placeholder="Description du programme"></textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn">Créer le programme</button>
    </div>
  </form>

  <script src="./create.js"></script>
</body>
</html>
