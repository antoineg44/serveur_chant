<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connexion — WebApp Serveur Chant</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="./config.js"></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      animation: pop-in 400ms ease;
    }

    .login-card h1 {
      margin: 0 0 6px;
      font-size: 1.6rem;
    }

    .login-card p {
      margin: 0 0 28px;
      color: var(--ink-soft);
      font-size: 0.95rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }

    .field label {
      font-weight: 600;
      font-size: 0.92rem;
    }

    .field input {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 14px;
      font: inherit;
      font-size: 1rem;
      background: #fff;
      color: var(--ink);
      transition: border-color 150ms ease;
    }

    .field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15);
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      border-radius: 12px;
      margin-top: 6px;
      border: none;
      background: linear-gradient(130deg, var(--accent) 0%, #14b8a6 100%);
      color: #fff;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: filter 150ms ease;
    }

    .btn-login:hover {
      filter: brightness(1.08);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      filter: none;
    }

    .error-msg {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 10px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      font-size: 0.92rem;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }

    @keyframes pop-in {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
  <div class="bg-shape bg-shape-2" aria-hidden="true"></div>

  <div class="login-card">
    <h1>WebApp Serveur Chant</h1>
    <p>Connectez-vous pour accéder à l'interface.</p>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="username">Identifiant</label>
        <input id="username" type="text" name="username" autocomplete="username" required autofocus />
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <input id="password" type="password" name="password" autocomplete="current-password" required />
      </div>

      <button class="btn-login" type="submit" id="login-btn">Se connecter</button>

      <div class="error-msg" id="error-msg" role="alert"></div>
    </form>
  </div>

  <script>
    const AUTH_API = (window.WEBAPP_CONFIG && window.WEBAPP_CONFIG.AUTH_API)
      || `${(window.WEBAPP_CONFIG && window.WEBAPP_CONFIG.BASE_URL) || ''}webapp/api/auth.php`;

    const form    = document.getElementById('login-form');
    const btn     = document.getElementById('login-btn');
    const errorEl = document.getElementById('error-msg');

    function showError(message) {
      errorEl.textContent = message;
      errorEl.classList.add('visible');
    }

    function hideError() {
      errorEl.classList.remove('visible');
    }

    // Redirect if already logged in
    (async () => {
      try {
        const res  = await fetch(`${AUTH_API}?action=check`, { credentials: 'include' });
        const data = await res.json();
        if (data.success) {
          window.location.replace('./index.html');
        }
      } catch {
        // no session — stay on page
      }
    })();

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      hideError();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Veuillez remplir tous les champs.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Connexion…';

      try {
        const body = new URLSearchParams({ username, password });
        const res  = await fetch(`${AUTH_API}?action=login`, {
          method: 'POST',
          credentials: 'include',
          body,
        });
        const data = await res.json();

        if (data.success) {
          window.location.replace('./index.html');
        } else {
          showError(data.message || 'Échec de la connexion.');
        }
      } catch {
        showError('Erreur réseau. Vérifiez votre connexion.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    });
  </script>
</body>
</html>
