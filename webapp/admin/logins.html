<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connexions — WebApp Serveur Chant</title>
  <link rel="stylesheet" href="../styles.css" />
  <script src="../config.js"></script>

  <style>
    .historic-topbar {
      max-width: 1100px;
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .historic-topbar h1 {
      margin: 0;
      font-size: 1.4rem;
    }

    .historic-topbar .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .historic-layout {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .historic-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .historic-card-head {
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--line);
    }

    .historic-card-head h2 {
      margin: 0;
      font-size: 1.1rem;
    }

    .historic-card-head p {
      margin: 6px 0 0;
      color: var(--ink-soft);
    }

    .historic-table-wrap {
      padding: 14px 18px 18px;
    }

    .historic-table {
      width: 100%;
    }

    .dataTables_wrapper .dataTables_filter input,
    .dataTables_wrapper .dataTables_length select,
    .historic-pager .pager-size select {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 6px 10px;
      background: #fff;
      color: var(--ink);
    }

    table.dataTable thead th {
      background: #fff8eb;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 0.8rem;
    }

    table.dataTable tbody tr:hover {
      background: #fffbf4;
    }

    .dataTables_wrapper .dataTables_paginate .paginate_button.current {
      background: var(--accent) !important;
      color: #fff !important;
      border-color: transparent !important;
    }

    .historic-table.is-fallback-sorting thead th {
      cursor: pointer;
      user-select: none;
    }

    .historic-pager {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .historic-pager .pager-info {
      color: var(--ink-soft);
      font-size: 0.95rem;
    }

    .historic-pager .pager-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .historic-pager .pager-size {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--ink-soft);
    }

    .historic-pager button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 760px) {
      .historic-table-wrap {
        padding: 8px;
      }

      .historic-topbar,
      .historic-layout {
        width: calc(100% - 16px);
      }
    }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
  <div class="bg-shape bg-shape-2" aria-hidden="true"></div>

  <div class="historic-topbar">
    <h1>Connexions utilisateurs</h1>
    <div class="actions">
      <a href="../index.html" class="btn btn-ghost">← Retour</a>
      <a href="https://partitions.ovh" class="btn btn-ghost">Accueil</a>
    </div>
  </div>

  <main class="historic-layout">
    <section class="historic-card" aria-label="Journal des connexions">
      <div class="historic-card-head">
        <h2>Connexions réussies</h2>
        <p>Historique des connexions enregistrées lors des authentifications réussies.</p>
      </div>
      <div class="historic-table-wrap">
        <table id="connexions" class="display hover historic-table">
          <thead>
            <tr>
              <th>id</th>
              <th>Date</th>
              <th>utilisateur</th>
              <th>role</th>
              <th>ip</th>
              <th>agent</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <div class="historic-pager" data-pager-for="connexions">
          <div class="pager-info" data-pager-info="connexions">Page 1</div>
          <label class="pager-size" for="page-size-connexions">
            Lignes
            <select id="page-size-connexions" data-page-size-for="connexions">
              <option value="10">10</option>
              <option value="25" selected>25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </label>
          <div class="pager-actions">
            <button type="button" class="btn btn-ghost" data-pager-prev="connexions">← Précédent</button>
            <button type="button" class="btn btn-ghost" data-pager-next="connexions">Suivant →</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    var fallbackTableState = {
      connexions: { sortColumn: null, sortAsc: true, endpointUrl: '', start: 0, length: 25, recordsTotal: 0 }
    };

    function loadScriptWithFallback(urls) {
      return new Promise(function (resolve, reject) {
        var index = 0;

        function tryNext() {
          if (index >= urls.length) {
            reject(new Error('Unable to load DataTables script.'));
            return;
          }

          var script = document.createElement('script');
          script.src = urls[index++];
          script.async = true;
          script.onload = function () { resolve(); };
          script.onerror = function () { tryNext(); };
          document.head.appendChild(script);
        }

        tryNext();
      });
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function buildServerSideQuery(start, length, orderColumn, orderDirection) {
      var safeStart = Number.isFinite(start) && start >= 0 ? Math.floor(start) : 0;
      var safeLength = Number.isFinite(length) && length > 0 ? Math.floor(length) : 25;
      var query = [
        'draw=1',
        'start=' + encodeURIComponent(String(safeStart)),
        'length=' + encodeURIComponent(String(safeLength)),
        'columns[0][data]=0', 'columns[0][searchable]=true', 'columns[0][orderable]=true', 'columns[0][search][value]=',
        'columns[1][data]=1', 'columns[1][searchable]=true', 'columns[1][orderable]=true', 'columns[1][search][value]=',
        'columns[2][data]=2', 'columns[2][searchable]=true', 'columns[2][orderable]=true', 'columns[2][search][value]=',
        'columns[3][data]=3', 'columns[3][searchable]=true', 'columns[3][orderable]=true', 'columns[3][search][value]=',
        'columns[4][data]=4', 'columns[4][searchable]=true', 'columns[4][orderable]=true', 'columns[4][search][value]=',
        'columns[5][data]=5', 'columns[5][searchable]=true', 'columns[5][orderable]=true', 'columns[5][search][value]='
      ];

      if (orderColumn !== null && orderColumn !== undefined) {
        query.push('order[0][column]=' + encodeURIComponent(String(orderColumn)));
        query.push('order[0][dir]=' + encodeURIComponent(orderDirection === 'desc' ? 'desc' : 'asc'));
      }

      return query.join('&');
    }

    function updatePager(tableId) {
      var state = fallbackTableState[tableId];
      var info = document.querySelector('[data-pager-info="' + tableId + '"]');
      var prevButton = document.querySelector('[data-pager-prev="' + tableId + '"]');
      var nextButton = document.querySelector('[data-pager-next="' + tableId + '"]');
      var currentPage = state.recordsTotal > 0 ? Math.floor(state.start / state.length) + 1 : 1;
      var totalPages = state.recordsTotal > 0 ? Math.ceil(state.recordsTotal / state.length) : 1;

      if (info) {
        info.textContent = 'Page ' + currentPage + ' / ' + totalPages + ' - ' + state.recordsTotal + ' lignes';
      }

      if (prevButton) {
        prevButton.disabled = state.start <= 0;
      }

      if (nextButton) {
        nextButton.disabled = state.start + state.length >= state.recordsTotal;
      }
    }

    function syncPageSizeSelector(tableId) {
      var state = fallbackTableState[tableId];
      var select = document.querySelector('[data-page-size-for="' + tableId + '"]');

      if (state && select) {
        select.value = String(state.length);
      }
    }

    function setPagerVisibility(tableId, isVisible) {
      var pager = document.querySelector('[data-pager-for="' + tableId + '"]');
      if (pager) {
        pager.hidden = !isVisible;
      }
    }

    function renderFallbackRows(tableId, rows) {
      var table = document.getElementById(tableId);
      var tbody = table && table.querySelector('tbody');
      if (!tbody) {
        return;
      }

      if (!Array.isArray(rows) || !rows.length) {
        tbody.innerHTML = '<tr><td colspan="6">Aucune donnée.</td></tr>';
        updatePager(tableId);
        return;
      }

      tbody.innerHTML = rows.map(function (row) {
        return '<tr>'
          + '<td>' + escapeHtml(row[0]) + '</td>'
          + '<td>' + escapeHtml(row[1]) + '</td>'
          + '<td>' + escapeHtml(row[2]) + '</td>'
          + '<td>' + escapeHtml(row[3]) + '</td>'
          + '<td>' + escapeHtml(row[4]) + '</td>'
          + '<td>' + escapeHtml(row[5]) + '</td>'
          + '</tr>';
      }).join('');

      updatePager(tableId);
    }

    function wireFallbackSorting(tableId) {
      var table = document.getElementById(tableId);
      if (!table || table.dataset.sortWired === '1') {
        return;
      }

      table.dataset.sortWired = '1';
      table.classList.add('is-fallback-sorting');

      Array.prototype.slice.call(table.querySelectorAll('thead th')).forEach(function (header, index) {
        header.title = 'Cliquer pour trier';
        header.addEventListener('click', function () {
          var state = fallbackTableState[tableId];
          if (state.sortColumn === index) {
            state.sortAsc = !state.sortAsc;
          } else {
            state.sortColumn = index;
            state.sortAsc = true;
          }

          state.start = 0;
          void loadSimpleHistory(tableId, state.endpointUrl, state.start, state.length, state.sortColumn, state.sortAsc ? 'asc' : 'desc');
        });
      });
    }

    async function loadSimpleHistory(tableId, endpointUrl, start, length, orderColumn, orderDirection) {
      var table = document.getElementById(tableId);
      var tbody = table && table.querySelector('tbody');
      if (!tbody) {
        return;
      }

      wireFallbackSorting(tableId);
      fallbackTableState[tableId].endpointUrl = endpointUrl;
      fallbackTableState[tableId].start = Number.isFinite(start) && start >= 0 ? Math.floor(start) : 0;
      fallbackTableState[tableId].length = Number.isFinite(length) && length > 0 ? Math.floor(length) : 25;

      tbody.innerHTML = '<tr><td colspan="6">Chargement...</td></tr>';

      var url = endpointUrl + '?' + buildServerSideQuery(
        fallbackTableState[tableId].start,
        fallbackTableState[tableId].length,
        orderColumn,
        orderDirection
      );

      try {
        var response = await fetch(url, { credentials: 'include' });
        if (!response.ok) {
          throw new Error('HTTP ' + response.status);
        }

        var payload = await response.json();
        var rows = Array.isArray(payload.data) ? payload.data : [];
        fallbackTableState[tableId].recordsTotal = Number.isFinite(payload.recordsTotal) ? payload.recordsTotal : rows.length;
        syncPageSizeSelector(tableId);
        renderFallbackRows(tableId, rows);
      } catch (error) {
        tbody.innerHTML = '<tr><td colspan="6">Erreur de chargement.</td></tr>';
        updatePager(tableId);
      }
    }

    function bindPagerControls(tableId) {
      var prevButton = document.querySelector('[data-pager-prev="' + tableId + '"]');
      var nextButton = document.querySelector('[data-pager-next="' + tableId + '"]');
      var pageSizeSelect = document.querySelector('[data-page-size-for="' + tableId + '"]');
      var state = fallbackTableState[tableId];

      if (prevButton && prevButton.dataset.pagerWired !== '1') {
        prevButton.dataset.pagerWired = '1';
        prevButton.addEventListener('click', function () {
          if (state.start <= 0) {
            return;
          }

          state.start = Math.max(0, state.start - state.length);
          void loadSimpleHistory(tableId, state.endpointUrl, state.start, state.length, state.sortColumn, state.sortAsc ? 'asc' : 'desc');
        });
      }

      if (nextButton && nextButton.dataset.pagerWired !== '1') {
        nextButton.dataset.pagerWired = '1';
        nextButton.addEventListener('click', function () {
          if (state.start + state.length >= state.recordsTotal) {
            return;
          }

          state.start = state.start + state.length;
          void loadSimpleHistory(tableId, state.endpointUrl, state.start, state.length, state.sortColumn, state.sortAsc ? 'asc' : 'desc');
        });
      }

      if (pageSizeSelect && pageSizeSelect.dataset.pagerWired !== '1') {
        pageSizeSelect.dataset.pagerWired = '1';
        pageSizeSelect.addEventListener('change', function () {
          var nextLength = parseInt(pageSizeSelect.value, 10);
          if (!Number.isFinite(nextLength) || nextLength <= 0) {
            return;
          }

          state.length = nextLength;
          state.start = 0;
          void loadSimpleHistory(tableId, state.endpointUrl, state.start, state.length, state.sortColumn, state.sortAsc ? 'asc' : 'desc');
        });
      }
    }

    function initFallbackTables(apiBase) {
      setPagerVisibility('connexions', true);
      bindPagerControls('connexions');
      void loadSimpleHistory('connexions', apiBase + 'get_logins.php', 0, fallbackTableState.connexions.length);
    }

    function initHistoricTables() {
      var apiBase = 'https://partitions.ovh/webapp/admin/';

      if (typeof window.DataTable !== 'function') {
        initFallbackTables(apiBase);
        return;
      }

      setPagerVisibility('connexions', false);

      new DataTable('#connexions', {
        ajax: apiBase + 'get_logins.php',
        processing: true,
        serverSide: true,
        pageLength: 25,
        lengthMenu: [[10, 25, 50, 100], [10, 25, 50, 100]]
      });
    }

    document.addEventListener('DOMContentLoaded', function () {
      loadScriptWithFallback([
        'https://cdn.datatables.net/2.0.8/js/dataTables.js',
        'https://cdnjs.cloudflare.com/ajax/libs/datatables/2.0.8/dataTables.min.js',
        'https://unpkg.com/datatables.net@2.0.8/js/dataTables.min.js'
      ])
        .then(initHistoricTables)
        .catch(function () {
          initHistoricTables();
        });
    });
  </script>
</body>
</html>
